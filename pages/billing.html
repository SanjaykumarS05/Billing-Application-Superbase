<section id="billingPage" class="page visible">
  <div class="main-grid single">
    <article class="card panel">
      <h3>Create Invoice</h3>
      <form id="billForm" class="stack compact">
        <div class="grid two">
          <label>
            Customer
            <input id="customerName" list="customerList" type="text" required />
            <datalist id="customerList"></datalist>
          </label>
          <label>
            Customer GSTIN
            <input id="customerGstin" type="text" placeholder="Auto-fill if customer exists" />
          </label>
        </div>
        <div class="grid two">
          <label>
            Buyer Address
            <textarea id="customerAddress" rows="2"></textarea>
          </label>
          <label>
            State
            <select id="customerState"></select>
          </label>
        </div>
        <div class="grid three">
          <label>
            Contact Number
            <input id="customerPhone" type="text" />
          </label>
          <label>
            Buyer Email
            <input id="customerEmail" type="email" />
          </label>
          <label>
            e-Way Bill No
            <input id="eWayBillNo" type="text" />
          </label>
        </div>

        <div class="grid two">
          <label>
            Bill Date
            <input id="billDate" type="date" required />
          </label>
          <label>
            Supply Type
            <select id="taxMode">
              <option value="intra">Intra-state (CGST + SGST)</option>
              <option value="inter">Inter-state (IGST)</option>
              <option value="none">No Tax</option>
            </select>
          </label>
        </div>

        <div class="row-head details-head">
          <button id="toggleDetailsBtn" type="button" class="btn ghost">+ Add Details</button>
        </div>
        <div id="invoiceDetailsSection" class="invoice-details hidden">
          <div class="grid two">
            <label>
              Delivery Note
              <input id="deliveryNote" type="text" />
            </label>
            <label>
              Reference No. &amp; Date
              <input id="referenceNoDate" type="text" />
            </label>
          </div>
          <div class="grid two">
            <label>
              Other References
              <input id="otherReferences" type="text" />
            </label>
            <label>
              Buyer's Order No.
              <input id="buyersOrderNo" type="text" />
            </label>
          </div>
          <div class="grid two">
            <label>
              Buyer's Order Date
              <input id="buyersOrderDate" type="date" />
            </label>
            <label>
              Dispatch Doc No.
              <input id="dispatchDocNo" type="text" />
            </label>
          </div>
          <div class="grid two">
            <label>
              Delivery Note Date
              <input id="deliveryNoteDate" type="date" />
            </label>
            <label>
              Dispatched Through
              <input id="dispatchedThrough" type="text" />
            </label>
          </div>
          <div class="grid two">
            <label>
              Destination
              <input id="destination" type="text" />
            </label>
            <label>
              Terms of Delivery
              <input id="termsOfDelivery" type="text" />
            </label>
          </div>
        </div>

        <div class="row-head">
          <h4>Invoice Items</h4>
        </div>
        <div id="itemsList" class="item-list"></div>

        <div class="totals">
          <div><span>Taxable</span><strong id="subtotalVal">0.00</strong></div>
          <div><span>CGST</span><strong id="cgstVal">0.00</strong></div>
          <div><span>SGST</span><strong id="sgstVal">0.00</strong></div>
          <div><span>IGST</span><strong id="igstVal">0.00</strong></div>
          <div class="grand"><span>Total</span><strong id="totalVal">0.00</strong></div>
        </div>

        <div class="grid two">
          <button class="btn ghost" type="submit" data-action="save">Save</button>
          <button class="btn primary" type="submit" data-action="save-print">Save &amp; Print</button>
        </div>
        <p id="billMessage" class="message"></p>
      </form>
    </article>
  </div>
</section>

<div id="billSignatureModal" class="invoice-modal-backdrop hidden">
  <div class="invoice-modal signature-modal" role="dialog" aria-modal="true" aria-labelledby="billSignatureModalTitle">
    <div class="invoice-modal-head">
      <div class="invoice-modal-title-wrap">
        <h3 id="billSignatureModalTitle">Recipient Signature</h3>
        <p class="invoice-modal-meta">Sign here before saving the invoice.</p>
      </div>
      <button id="closeBillSignatureModalBtn" type="button" class="inline-btn">Close</button>
    </div>
    <div class="signature-modal-body">
      <div class="grid two">
        <label>
          Recipient Name
          <input id="billSignatureNameInput" type="text" placeholder="Recipient" />
        </label>
        <label>
          Signature Style
          <select id="billSignatureStyleSelect">
            <option value="script">Script</option>
            <option value="classic">Classic</option>
            <option value="bold">Bold</option>
            <option value="italic">Italic</option>
          </select>
        </label>
      </div>
      <label>
        Upload Signature
        <input id="billSignatureUploadInput" type="file" accept="image/*" />
      </label>
      <div class="signature-live-preview">
        <div class="signature-live-label">Live Preview</div>
        <div id="billSignatureDesignPreview" class="signature-design-preview">No signature added</div>
      </div>
      <div class="signature-draw-label">Or draw signature below</div>
      <canvas id="billSignatureCanvas" class="signature-canvas"></canvas>
    </div>
    <div class="signature-modal-actions">
      <button id="clearBillSignatureCanvasBtn" type="button" class="btn ghost">Clear</button>
      <button id="saveBillSignatureCanvasBtn" type="button" class="btn primary">Save Invoice</button>
    </div>
  </div>
</div>
