<section id="settingsPage" class="page hidden">
  <div class="main-grid single">
    <article class="card panel">
      <h3>Settings</h3>
      <div class="radio-toggle" id="settingsToggle">
        <label><input type="radio" name="settingsTab" value="profile" checked /> Profile</label>
        <label><input type="radio" name="settingsTab" value="tax" /> Tax</label>
        <label id="usersSettingsTabLabel"><input type="radio" name="settingsTab" value="users" /> Users</label>
        <label><input type="radio" name="settingsTab" value="password" /> Password</label>
      </div>

      <div id="settingsProfile" class="settings-panel visible">
        <form id="profileForm" class="stack compact">
          <div class="grid two">
            <label>
              Business Name
              <input id="profileName" type="text" />
            </label>
            <label>
              Business Email
              <input id="profileEmail" type="email" required />
            </label>
            <label>
              GSTIN/UIN
              <input id="profileGstin" type="text" />
            </label>
            <label>
              Contact Number
              <input id="profilePhone" type="text" />
            </label>
            <label>
              State Name
              <select id="profileState"></select>
            </label>
            <label>
              State Code
              <input id="profileStateCode" type="text" />
            </label>
          </div>
          <label>
            Business Address
            <textarea id="profileAddress" rows="3"></textarea>
          </label>
          <div class="grid two">
            <label>
              Bank Name
              <input id="profileBankName" type="text" />
            </label>
            <label>
              Bank A/c No
              <input id="profileAccountNo" type="text" />
            </label>
            <label>
              Branch Name
              <input id="profileBranchName" type="text" />
            </label>
            <label>
              IFSC Code
              <input id="profileIfsc" type="text" />
            </label>
          </div>
          <label>
            Declaration
            <textarea id="profileDeclaration" rows="3"></textarea>
          </label>
          <label>
            Authorized Signatory Name
            <input id="profileSignatory" type="text" />
          </label>
          <button class="btn primary" type="submit">Save Profile</button>
          <p id="profileMessage" class="message"></p>
        </form>
      </div>

      <div id="settingsTax" class="settings-panel hidden">
        <form id="taxForm" class="stack compact">
          <label>
            Invoice Prefix
            <input id="invoicePrefix" type="text" maxlength="20" placeholder="GST" />
          </label>
          <label>
            Invoice Start Value
            <input id="invoiceStartValue" type="number" min="1" step="1" required />
          </label>
          <label>
            Default Tax %
            <input id="defaultTaxRate" type="number" min="0" max="50" step="0.01" required />
          </label>
          <button class="btn primary" type="submit">Save Tax</button>
          <p id="taxMessage" class="message"></p>
        </form>
      </div>

      <div id="settingsUsers" class="settings-panel hidden">
        <div class="stack compact">
          <div class="form-actions">
            <button id="addUserBtn" class="btn primary" type="button">Add User</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Username</th>
                  <th>Email</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="usersTableBody"></tbody>
            </table>
          </div>
          <p id="usersMessage" class="message"></p>
        </div>
      </div>

      <div id="settingsPassword" class="settings-panel hidden">
        <form id="passwordForm" class="stack compact" autocomplete="off">
          <input type="text" autocomplete="username" name="fake-username" style="display:none" />
          <input type="password" autocomplete="current-password" name="fake-password" style="display:none" />
          <label>
            Username
            <input id="passwordUsername" type="text" autocomplete="off" required />
          </label>
          <label>
            New Password
            <input id="newPassword" type="password" autocomplete="new-password" minlength="6" />
          </label>
          <label>
            Confirm Password
            <input id="confirmPassword" type="password" autocomplete="new-password" minlength="6" />
          </label>
          <button class="btn primary" type="submit">Save Login Details</button>
          <p id="passwordMessage" class="message"></p>
        </form>
      </div>
    </article>
  </div>
</section>

<div id="addUserModal" class="invoice-modal-backdrop hidden">
  <form id="addUserForm" class="invoice-modal user-modal" role="dialog" aria-modal="true" aria-labelledby="addUserTitle">
    <div class="invoice-modal-head">
      <div class="invoice-modal-title-wrap">
        <h3 id="addUserTitle">Add User</h3>
      </div>
      <button id="closeAddUserModalBtn" type="button" class="inline-btn">Close</button>
    </div>
    <div class="stack compact">
      <label>
        Username
        <input id="newUserUsername" type="text" required />
      </label>
      <label>
        Password
        <input id="newUserPassword" type="password" minlength="6" required />
      </label>
      <label>
        Email
        <input id="newUserEmail" type="email" required />
      </label>
      <div class="form-actions">
        <button class="btn primary" type="submit">Save User</button>
      </div>
      <p id="addUserMessage" class="message"></p>
    </div>
  </form>
</div>
