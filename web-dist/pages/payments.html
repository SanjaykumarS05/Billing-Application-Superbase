<section id="paymentsPage" class="page hidden">
  <div class="main-grid single">
    <article class="card panel">
      <div class="row-head">
        <h3>Invoice Payments</h3>
      </div>
      <form id="paymentForm" class="stack compact payment-form">
        <div class="grid two">
          <label>
            Invoice
            <select id="paymentBillId" required></select>
          </label>
          <label>
            Payment Date
            <input id="paymentDate" type="date" required />
          </label>
        </div>
        <div class="grid three">
          <label>
            Amount
            <input id="paymentAmount" type="number" min="0.01" step="0.01" required />
          </label>
          <label>
            Method
            <select id="paymentMethod">
              <option value="Cash">Cash</option>
              <option value="UPI">UPI</option>
              <option value="Bank Transfer">Bank Transfer</option>
              <option value="Cheque">Cheque</option>
              <option value="Card">Card</option>
            </select>
          </label>
          <label>
            Reference No
            <input id="paymentReference" type="text" />
          </label>
        </div>
        <label>
          Notes
          <textarea id="paymentNotes" rows="2"></textarea>
        </label>
        <div class="payment-summary-strip" id="paymentSummaryStrip">
          <div><span>Invoice Total</span><strong id="paymentInvoiceTotal">0.00</strong></div>
          <div><span>Paid</span><strong id="paymentPaidAmount">0.00</strong></div>
          <div><span>Balance</span><strong id="paymentDueAmount">0.00</strong></div>
        </div>
        <div class="form-actions">
          <button class="btn primary" type="submit">Save Payment</button>
        </div>
        <p id="paymentMessage" class="message"></p>
      </form>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Receipt</th>
              <th>Invoice</th>
              <th>Customer</th>
              <th>Date</th>
              <th>Amount</th>
              <th>Method</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="paymentsTableBody"></tbody>
        </table>
      </div>
    </article>
  </div>
</section>
