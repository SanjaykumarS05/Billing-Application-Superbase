<section id="productsPage" class="page hidden">
  <div class="main-grid single">
    <article class="card panel">
      <h3>Add Product</h3>
      <form id="productForm" class="stack compact">
        <div class="grid three">
          <label>
            Product Name
            <input id="prodName" type="text" required />
          </label>
          <label>
            HSN/SAC
            <input id="prodHsn" type="text" />
          </label>
          <label>
            Unit/Measurement
            <select id="prodUnit">
              <option value="Kgs" selected>Kgs</option>
              <option value="Meter">Meter</option>
              <option value="Pices">Pices</option>
            </select>
          </label>
          <label>
            Default Rate
            <input id="prodRate" type="number" min="0" step="0.01" required />
          </label>
        </div>
        <div class="form-actions">
          <button id="productSubmitBtn" class="btn primary" type="submit">Save Product</button>
          <button id="productCancelEditBtn" class="btn ghost hidden" type="button">Cancel Edit</button>
        </div>
        <p id="productMessage" class="message"></p>
      </form>
    </article>

    <article class="card panel">
      <h3>Product List</h3>
      <div class="search-row">
        <input id="productSearchInput" type="text" placeholder="Search product, HSN/SAC, unit or rate" />
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Product</th>
              <th>HSN/SAC</th>
              <th>Unit</th>
              <th>Rate</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="productsTableBody"></tbody>
        </table>
      </div>
      <div id="productPagination" class="pagination-row"></div>
    </article>
  </div>
</section>
