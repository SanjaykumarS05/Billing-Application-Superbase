<section id="productSalesPage" class="page hidden">
  <div class="main-grid single">
    <article class="card panel">
      <h3>Product Sales</h3>
      <div class="filter-row">
        <input id="productSalesSearchInput" type="text" placeholder="Search product or HSN/SAC" />
        <input id="productSalesDateFrom" type="date" />
        <input id="productSalesDateTo" type="date" />
        <button id="productSalesResetBtn" class="btn ghost" type="button">Reset</button>
        <button id="productSalesExportBtn" class="btn ghost" type="button">Download Excel</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Product</th>
              <th>HSN/SAC</th>
              <th>Qty</th>
              <th>Taxable</th>
              <th>Tax</th>
              <th>Total</th>
              <th>Invoices</th>
            </tr>
          </thead>
          <tbody id="productSalesTableBody"></tbody>
        </table>
      </div>
      <div id="productSalesPagination" class="pagination-row"></div>
      <p id="productSalesMessage" class="message"></p>
    </article>
  </div>
</section>
